name: Daily News Bot

on:
  schedule:
    # 매일 아침 7시(한국 시간)에 실행 (UTC 기준 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 우리가 수동으로 버튼 눌러서 실행하고 싶을 때

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 필요한 도구 설치
        run: pip install requests

      - name: 프로그램 실행
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
